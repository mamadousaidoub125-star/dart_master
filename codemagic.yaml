workflows:
  android-workflow:
    name: Dart Master - Android
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Générer les fichiers natifs Android manquants
        script: |
          flutter create . --platforms=android --org com.dartmaster --project-name dart_master
      - name: Installer les dépendances
        script: |
          flutter pub get
      - name: Compiler l'APK
        script: |
          flutter build apk --release
    artifacts:
      - build/app/outputs/**/*.apk
